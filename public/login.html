<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Bin 2 Basket</title>
  <link rel="stylesheet" href="/styles.css" />
  <script defer src="/js/common.js"></script>
  <script defer src="/js/chatbot.js"></script>
  <script defer src="/js/login.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="container row between center">
      <div class="row center">
        <img src="/logo.png" class="logo" alt="logo"/>
        <strong>Bin 2 Basket</strong>
      </div>
      <nav class="row gap">
        <a href="/register.html">Register</a>
        <a href="/shop.html">Groceries</a>
        <a href="/">Home</a>
      </nav>
    </div>
  </header>
  <main class="container" style="max-width:560px">
    <h2>Welcome back</h2>
    <div class="card">
      <form id="login-form">
        <div style="display:grid; gap:12px">
          <div>
            <label for="email">Email</label>
            <input id="email" type="email" required />
          </div>
          <div>
            <label for="password">Password</label>
            <input id="password" type="password" required />
          </div>
          <button type="submit">Login</button>
          <div class="muted">New here? <a class="link" href="/register.html">Create an account</a></div>
          <div id="login-msg" class="muted"></div>
        </div>
      </form>
    </div>
  </main>
  <div id="chatbot-root"></div>
</body>
</html>
